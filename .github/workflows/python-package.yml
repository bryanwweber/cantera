name: Build Python Package

on:
  push:
    branches:
      - add-pypi-package

jobs:
  ubuntu-multiple-pythons:
    name: Build Wheels on Ubuntu 20.04
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        python-version: [ '3.6', '3.7', '3.8', '3.9' ]
      fail-fast: false
    steps:
    - uses: actions/checkout@v2
      name: Checkout the repository
      with:
        submodules: recursive
    # - name: Setup Python
    #   uses: actions/setup-python@v2
    #   with:
    #     python-version: ${{ matrix.python-version }}
    #     architecture: x64
    # - name: Install Apt dependencies
    #   run: |
    #     sudo apt update
    #     sudo apt install libboost-dev
    - name: Build wheels
      uses: pypa/cibuildwheel@v1.12.0
      with:
        package-dir: interfaces/cython
      # to supply options, put them in 'env', like:
      env:
        CIBW_BUILD: cp36-* cp37-* cp38-* cp39-*
        CIBW_SKIP: "*-win32 *-manylinux_i686"
        CIBW_BEFORE_ALL_LINUX: "yum install -y boost-devel && python -m pip install scons cython numpy && python `which scons` build -j2"
        # CIBW_BEFORE_ALL: "python -m pip install scons cython numpy && python `which scons` build -j2"
    # - name: Upgrade pip
    #   run: python3 -m pip install -U pip setuptools wheel
    # - name: Install Python dependencies
    #   run: python3 -m pip install scons numpy cython
    # - name: Build Cantera
    #   run: python3 `which scons` build -j2 python_package=y
    # - name: Build Distributions
    #   run: python3 setup.py bdist_wheel
    #   working-directory: interfaces/cython
    - name: pypi-publish
      uses: pypa/gh-action-pypi-publish@v1.4.2
      with:
        user: __token__
        password: ${{ secrets.TEST_PYPI_TOKEN }}
        packages_dir: wheelhouse/
        repository_url: https://test.pypi.org/legacy/
