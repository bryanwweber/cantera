name: Build Python Package

on:
  push:
    branches:
      - add-pypi-package

jobs:
  ubuntu-wheel:
    name: Build Wheels on Ubuntu-20.04
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
      name: Checkout the repository
      with:
        submodules: recursive
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
      with:
        platforms: all
    - name: Build wheels
      uses: pypa/cibuildwheel@v1.12.0
      with:
        package-dir: interfaces/cython
      env:
        CIBW_BUILD: cp36-* cp37-* cp38-* cp39-*
        CIBW_SKIP: "*-manylinux_i686"
        CIBW_BEFORE_ALL_LINUX: |
          yum install -y boost-devel &&\
          python -m pip install scons cython numpy &&\
          python `which scons` build f90_interface=n debug=n googletest=none -j2
        CIBW_ARCHS_LINUX: "auto64 aarch64 ppc64le"
        CIBW_ENVIRONMENT: "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"

    - name: Archive the built wheels
      uses: actions/upload-artifact@v2
      with:
        path: ./wheelhouse/*.whl

  windows-wheel:
    name: Build Wheels on Windows
    runs-on: windows-2019
    strategy:
      matrix:
        include:
        - py-arch: 'x86'
          CIBW_ARCH: 'x86'
        - py-arch: 'x64'
          CIBW_ARCH: 'AMD64'
      fail-fast: false
    env:
      BOOST_ROOT: ${{ github.workspace }}/3rdparty/boost
      BOOST_URL: https://pilotfiber.dl.sourceforge.net/project/boost/boost/1.75.0/boost_1_75_0.7z
    steps:
    - uses: actions/checkout@v2
      name: Checkout the repository
      with:
        submodules: recursive
    - name: Restore Boost cache
      uses: actions/cache@v2
      id: cache-boost
      with:
        path: ${{env.BOOST_ROOT}}
        key: boost
    - name: Install Boost Headers
      if: steps.cache-boost.outputs.cache-hit != 'true' && runner.os == 'Windows'
      run: |
        BOOST_ROOT=$(echo $BOOST_ROOT | sed 's/\\/\//g')
        mkdir -p $BOOST_ROOT
        curl --progress-bar --location --output $BOOST_ROOT/download.7z $BOOST_URL
        7z -o$BOOST_ROOT x $BOOST_ROOT/download.7z -y -bd boost_1_75_0/boost
        mv $BOOST_ROOT/boost_1_75_0/boost $BOOST_ROOT/boost
        rm $BOOST_ROOT/download.7z
      shell: bash
    - name: Set Up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
        architecture: ${{ matrix.py-arch }}
    - name: Update pip
      run: python -m pip install -U pip setuptools
    - name: Install CIBuildWheel
      run: python -m pip install cibuildwheel==1.12.0 scons pypiwin32 numpy cython
    - name: Build the base package
      run: |
        scons build boost_inc_dir=%BOOST_ROOT% f90_interface=n debug=n googletest=none toolchain=msvc -j2
    - name: Build the wheels
      run: |
        python -m cibuildwheel interfaces/cython
      env:
        CIBW_ENVIRONMENT: "GITHUB_WORKSPACE=${GITHUB_WORKSPACE} BOOST_ROOT=${BOOST_ROOT}"
        CIBW_ARCHS: ${{ matrix.CIBW_ARCH }}
    - name: Archive the built wheels
      uses: actions/upload-artifact@v2
      with:
        path: ./wheelhouse/*.whl
  macos-wheel:
    name: Build Wheels on macOS
    runs-on: macos-10.15
    steps:
    - uses: actions/checkout@v2
      name: Checkout the repository
      with:
        submodules: recursive
    - name: Install Brew dependencies
      run: brew install boost
    - name: Build wheels
      uses: pypa/cibuildwheel@v1.12.0
      with:
        package-dir: interfaces/cython
      env:
        CIBW_BUILD: cp37-* cp38-* cp39-*
        CIBW_BEFORE_ALL_MACOS: |
          which python &&\
          which python3 &&\
          python3 -m pip install scons cython numpy &&\
          python3 `which scons` build debug=n f90_interface=n googletest=none -j3
        CIBW_ARCHS_MACOS: "x86_64"
        CIBW_ENVIRONMENT: "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"

    - name: Archive the built wheels
      uses: actions/upload-artifact@v2
      with:
        path: ./wheelhouse/*.whl
